<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Meaning</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #06030f; --surface: #100820; --border: rgba(99,102,241,0.25);
      --accent: #6366f1; --accent2: #a5b4fc;
      --text: #eef2ff; --muted: rgba(255,255,255,0.45);
      --green: #22c55e; --red: #f43f5e; --yellow: #fbbf24;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 1.5rem;
      background-image: radial-gradient(ellipse at top, rgba(99,102,241,0.12) 0%, transparent 60%);
    }
    .back{position:fixed;top:1rem;left:1rem;color:var(--muted);text-decoration:none;font-size:0.8rem;transition:color 0.15s;}
    .back:hover{color:var(--accent2);}

    .game{width:100%;max-width:580px;}
    .header{text-align:center;margin-bottom:2rem;}
    .header h1{font-size:2rem;font-weight:900;letter-spacing:-0.03em;}
    .header h1 span{background:linear-gradient(135deg,#a5b4fc,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .header p{color:var(--muted);font-size:0.875rem;margin-top:0.3rem;}

    .hud{display:flex;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:0.85rem 1.25rem;margin-bottom:0.75rem;}
    .hud-item{text-align:center;}
    .hud-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:0.2rem;}
    .hud-val{font-size:1.3rem;font-weight:800;}

    .lives-row{display:flex;gap:0.3rem;font-size:1.1rem;}

    .progress-wrap{height:4px;background:rgba(255,255,255,0.08);border-radius:99px;margin-bottom:1.25rem;overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#818cf8);border-radius:99px;transition:width 0.4s ease;}

    /* word card */
    .word-card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:20px;padding:2rem;margin-bottom:1rem;
      position:relative;overflow:hidden;transition:border-color 0.2s;
    }
    .word-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.6;}
    .word-card.correct-flash{animation:cFlash 0.4s ease;border-color:var(--green);}
    .word-card.wrong-flash{animation:shake 0.45s cubic-bezier(0.36,0.07,0.19,0.97);border-color:var(--red);}
    @keyframes cFlash{0%{background:var(--surface)}40%{background:rgba(34,197,94,0.12)}100%{background:var(--surface)}}
    @keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-8px)}30%{transform:translateX(8px)}45%{transform:translateX(-6px)}60%{transform:translateX(6px)}75%{transform:translateX(-3px)}90%{transform:translateX(3px)}}

    .word-tag{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent2);font-weight:700;margin-bottom:0.75rem;display:flex;align-items:center;gap:0.4rem;}
    .word-tag::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);}

    .the-word{font-size:2.8rem;font-weight:900;letter-spacing:-0.03em;margin-bottom:0.25rem;line-height:1;}

    .word-meta{font-size:0.78rem;color:var(--muted);font-style:italic;margin-bottom:1.5rem;}

    .instruction{font-size:0.8rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);margin-bottom:0.75rem;font-weight:600;}

    /* options */
    .options{display:flex;flex-direction:column;gap:0.6rem;}
    .opt{
      background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.1);
      border-radius:10px;padding:0.9rem 1rem;
      font-size:0.9rem;line-height:1.5;cursor:pointer;color:var(--text);
      text-align:left;transition:all 0.15s;display:flex;align-items:flex-start;gap:0.65rem;
      font-family:'Inter',sans-serif;
    }
    .opt:hover:not(:disabled){border-color:var(--accent);background:rgba(99,102,241,0.08);transform:translateX(3px);}
    .opt.correct{border-color:var(--green);background:rgba(34,197,94,0.1);color:var(--green);animation:slideRight 0.25s ease;}
    .opt.wrong{border-color:var(--red);background:rgba(244,63,94,0.08);color:var(--red);}
    .opt:disabled{cursor:default;}
    @keyframes slideRight{0%{transform:translateX(-4px)}100%{transform:translateX(0)}}

    .opt-key{width:1.6rem;height:1.6rem;border-radius:6px;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:800;flex-shrink:0;margin-top:0.05rem;}
    .opt.correct .opt-key{background:rgba(34,197,94,0.2);}
    .opt.wrong .opt-key{background:rgba(244,63,94,0.2);}

    /* example reveal */
    .example-reveal{
      margin-top:1rem;
      padding:0.85rem 1rem;
      background:rgba(99,102,241,0.08);
      border:1px solid rgba(99,102,241,0.2);
      border-radius:10px;
      font-size:0.85rem;
      font-style:italic;
      color:var(--accent2);
      line-height:1.6;
      display:none;
      animation:fadeSlide 0.3s ease;
    }
    .example-reveal.show{display:block;}
    @keyframes fadeSlide{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
    .example-reveal strong{font-style:normal;color:#fff;}

    /* keyboard shortcut hint */
    .kbd-hint{text-align:center;font-size:0.75rem;color:var(--muted);margin-top:0.5rem;}
    .kbd-hint span{display:inline-block;background:rgba(255,255,255,0.1);border-radius:4px;padding:0.1rem 0.4rem;font-family:monospace;font-size:0.7rem;}

    /* game over */
    #screen-over{display:none;text-align:center;}
    .over-emoji{font-size:4rem;margin-bottom:0.75rem;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
    @keyframes popIn{0%{transform:scale(0.7)}100%{transform:scale(1)}}
    .over-title{font-size:2.2rem;font-weight:900;letter-spacing:-0.03em;margin-bottom:0.5rem;}
    .over-sub{color:var(--muted);margin-bottom:2rem;font-size:0.9rem;line-height:1.6;max-width:400px;margin-left:auto;margin-right:auto;}
    .result-chips{display:flex;gap:0.75rem;justify-content:center;margin-bottom:2rem;}
    .chip{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;text-align:center;}
    .chip-val{font-size:1.8rem;font-weight:900;color:var(--accent2);}
    .chip-label{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-top:0.2rem;}
    .btn-row{display:flex;gap:0.75rem;max-width:320px;margin:0 auto;}
    .btn{flex:1;padding:0.9rem;border-radius:10px;border:none;font-size:0.9rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s;}
    .btn-primary{background:linear-gradient(135deg,#4338ca,#6366f1);color:#fff;}
    .btn-primary:hover{box-shadow:0 4px 20px rgba(99,102,241,0.5);}
    .btn-secondary{background:rgba(255,255,255,0.07);color:var(--muted);border:1px solid rgba(255,255,255,0.1);}

    #confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:100;}
  </style>
</head>
<body>
  <a class="back" href="https://game-hub.kiishiogunbiyi.workers.dev">← Hub</a>
  <canvas id="confetti-canvas"></canvas>

  <div class="game">
    <div class="header">
      <h1>📖 <span>Word Meaning</span></h1>
      <p>Match big words to their definitions. Your vocab is about to level up.</p>
    </div>

    <div id="screen-game">
      <div class="hud">
        <div class="hud-item"><div class="hud-label">Score</div><div class="hud-val" id="score" style="color:var(--accent2)">0</div></div>
        <div class="hud-item"><div class="hud-label">Lives</div><div class="lives-row" id="lives">❤️❤️❤️</div></div>
        <div class="hud-item"><div class="hud-label">Word</div><div class="hud-val" id="qnum" style="color:var(--muted)">1/10</div></div>
      </div>
      <div class="progress-wrap"><div class="progress-fill" id="prog" style="width:0%"></div></div>

      <div class="word-card" id="word-card">
        <div class="word-tag">Word of the round</div>
        <div class="the-word" id="the-word">—</div>
        <div class="word-meta" id="word-meta">—</div>
        <div class="instruction">Which definition is correct?</div>
        <div class="options" id="options"></div>
        <div class="example-reveal" id="example-reveal"></div>
      </div>
      <div class="kbd-hint">Keyboard: <span>A</span> <span>B</span> <span>C</span> <span>D</span></div>
    </div>

    <div id="screen-over">
      <div class="over-emoji" id="over-emoji">🎓</div>
      <div class="over-title" id="over-title">Round complete!</div>
      <div class="over-sub" id="over-sub"></div>
      <div class="result-chips">
        <div class="chip"><div class="chip-val" id="res-score">0</div><div class="chip-label">Score</div></div>
        <div class="chip"><div class="chip-val" id="res-correct">0/10</div><div class="chip-label">Correct</div></div>
        <div class="chip"><div class="chip-val" id="res-best">0</div><div class="chip-label">Best</div></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="location.href='https://game-hub.kiishiogunbiyi.workers.dev'">← Hub</button>
        <button class="btn btn-primary" id="btn-restart">Play Again</button>
      </div>
    </div>
  </div>

<script>
const AC=new(window.AudioContext||window.webkitAudioContext)();
function playTone(f,t,d,v=0.3,delay=0){const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime+delay);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+delay+d);o.start(AC.currentTime+delay);o.stop(AC.currentTime+delay+d+0.05);}
function sfxCorrect(){playTone(523,'sine',0.1,0.3);playTone(659,'sine',0.1,0.3,0.1);playTone(784,'sine',0.18,0.3,0.2);}
function sfxWrong(){playTone(200,'sawtooth',0.15,0.25);playTone(150,'sawtooth',0.2,0.2,0.15);}
function sfxWin(){[523,659,784,1047].forEach((f,i)=>playTone(f,'sine',0.15,0.25,i*0.1));}
const canvas=document.getElementById('confetti-canvas');const ctx2=canvas.getContext('2d');let particles=[];
function launchConfetti(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;for(let i=0;i<120;i++){particles.push({x:Math.random()*canvas.width,y:-10,vx:(Math.random()-0.5)*6,vy:Math.random()*4+2,w:Math.random()*10+4,h:Math.random()*5+3,rot:Math.random()*360,vr:(Math.random()-0.5)*8,color:['#6366f1','#a5b4fc','#22c55e','#fbbf24','#f43f5e','#38bdf8'][Math.floor(Math.random()*6)],alpha:1});}requestAnimationFrame(animateC);}
function animateC(){ctx2.clearRect(0,0,canvas.width,canvas.height);particles=particles.filter(p=>p.alpha>0.05);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;if(p.y>canvas.height*0.7)p.alpha-=0.02;ctx2.save();ctx2.translate(p.x,p.y);ctx2.rotate(p.rot*Math.PI/180);ctx2.globalAlpha=p.alpha;ctx2.fillStyle=p.color;ctx2.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx2.restore();});if(particles.length)requestAnimationFrame(animateC);}

const VOCAB=[
  {word:"ephemeral",pos:"adjective",def:"Lasting for a very short time; transitory.",wrong:["Extremely large and imposing in scale","Happening at perfectly regular intervals","Deeply rooted and resistant to change"],example:"The <strong>ephemeral</strong> nature of trending topics on social media is exhausting."},
  {word:"ubiquitous",pos:"adjective",def:"Present, appearing, or found everywhere.",wrong:["Extremely rare and difficult to encounter","Relating only to a single specific location","Moving rapidly from one place to another"],example:"Smartphones are so <strong>ubiquitous</strong> it's weird when someone doesn't have one."},
  {word:"loquacious",pos:"adjective",def:"Tending to talk a great deal; talkative.",wrong:["Extremely quiet and difficult to read","Prone to exaggeration and storytelling","Having a naturally pleasant singing voice"],example:"My <strong>loquacious</strong> uncle could turn a five-minute story into a two-hour ordeal."},
  {word:"sycophant",pos:"noun",def:"A person who flatters and obeys powerful people to gain advantage.",wrong:["Someone who openly challenges authority figures","A person with deep expertise in medicine","An independent advisor with no hidden agenda"],example:"The boss was surrounded by <strong>sycophants</strong> who agreed with everything he said."},
  {word:"taciturn",pos:"adjective",def:"Reserved or uncommunicative in speech; saying very little.",wrong:["Exceptionally gifted in musical performance","Prone to sudden and intense emotional outbursts","Highly inquisitive and curious about the world"],example:"The <strong>taciturn</strong> detective spoke only when he had something worth saying."},
  {word:"mendacious",pos:"adjective",def:"Not telling the truth; given to lying.",wrong:["Consistently generous and selfless toward others","Known for making rash and impulsive choices","Highly skilled in the art of negotiation"],example:"The <strong>mendacious</strong> politician claimed he'd never visited the country — twice."},
  {word:"equanimity",pos:"noun",def:"Mental calmness and composure, especially in difficult situations.",wrong:["A state of intense excitement or euphoria","Deep-seated resentment and bitterness","Obsessive and singular focus on a goal"],example:"She handled the criticism with <strong>equanimity</strong> — didn't even flinch."},
  {word:"pernicious",pos:"adjective",def:"Having a harmful effect, especially gradually or subtly.",wrong:["Highly beneficial and deeply nourishing","Brightly visible and immediately eye-catching","Connected to ancient customs and traditions"],example:"The <strong>pernicious</strong> influence of misinformation spreads slowly, then all at once."},
  {word:"capricious",pos:"adjective",def:"Given to sudden and unaccountable changes of mood or behavior.",wrong:["Remarkably consistent and disciplined over time","Deeply thoughtful before taking any action","Firmly loyal to a single set of principles"],example:"The <strong>capricious</strong> weather made planning an outdoor event impossible."},
  {word:"tenacious",pos:"adjective",def:"Not readily giving up; persistent and determined.",wrong:["Easily discouraged when things get difficult","Likely to abandon projects when better options appear","Flexible to the point of being unreliable"],example:"Her <strong>tenacious</strong> work ethic carried her through years of rejection."},
  {word:"avarice",pos:"noun",def:"Extreme greed for wealth or material possessions.",wrong:["Genuine generosity toward those who have less","A restless longing for adventure and new places","A state of deep spiritual contentment"],example:"His <strong>avarice</strong> led him to cut corners until the whole thing collapsed."},
  {word:"cogent",pos:"adjective",def:"Clear, logical, and convincing; compelling.",wrong:["Confusing and nearly impossible to follow","Emotionally overwhelming and deeply personal","Based entirely on anecdotal experience"],example:"She made a <strong>cogent</strong> argument and changed the entire room's mind."},
  {word:"insipid",pos:"adjective",def:"Lacking flavor, vigor, or interest; dull.",wrong:["Overwhelmingly intense and bold in character","Exceptionally sweet and pleasant to experience","Sharp, memorable, and hard to forget"],example:"The <strong>insipid</strong> sequel made everyone wish they'd rewatched the original instead."},
  {word:"verbose",pos:"adjective",def:"Using far more words than necessary; wordy.",wrong:["Extremely concise and efficient with language","Unable to express complex or nuanced ideas","Relying on images rather than text to communicate"],example:"The <strong>verbose</strong> email could have been a single sentence. It was not."},
  {word:"malleable",pos:"adjective",def:"Easily shaped, influenced, or adapted.",wrong:["Rigid, unyielding, and resistant to any change","Capable of exerting exceptional physical force","Likely to shatter or break under applied pressure"],example:"Public opinion is <strong>malleable</strong> — the right story at the right time changes everything."},
  {word:"acrimony",pos:"noun",def:"Bitterness or ill feeling, especially in speech or manner.",wrong:["Deep admiration and sincere respect for another","A feeling of shared triumph and collective pride","Genuine curiosity and openness toward others"],example:"The negotiation collapsed under the weight of <strong>acrimony</strong> on both sides."},
  {word:"obsequious",pos:"adjective",def:"Excessively compliant or eager to please; servile.",wrong:["Stubbornly resistant to any form of authority","Deeply spiritual and guided by inner conviction","Reliably efficient at completing assigned tasks"],example:"The <strong>obsequious</strong> assistant laughed at every single joke, even the bad ones."},
  {word:"perspicacious",pos:"adjective",def:"Having sharp insight and a ready understanding; shrewd.",wrong:["Extremely cautious to the point of hesitation","Given to rash and impulsive decision-making","Interested only in what appears on the surface"],example:"The <strong>perspicacious</strong> investor spotted the opportunity before anyone else did."},
  {word:"garrulous",pos:"adjective",def:"Excessively talkative, especially on trivial or unimportant matters.",wrong:["Naturally inclined toward silence and solitude","Highly focused and concise when communicating","Deliberate and thoughtful in every word spoken"],example:"The <strong>garrulous</strong> neighbor had opinions on everything, including your grass length."},
  {word:"laconic",pos:"adjective",def:"Using very few words; brief and concise in speech.",wrong:["Prone to long-winded and elaborate explanations","Emotionally expressive and openly communicative","Known for detailed and thorough descriptions"],example:"His <strong>laconic</strong> reply — 'Fine.' — said everything and nothing at once."},
];

const ROUND=10;
let questions=[],cur=0,score=0,lives=3,correctCount=0;
const getBest=()=>parseInt(localStorage.getItem('wm-best')||'0');
function shuffle(a){return[...a].sort(()=>Math.random()-0.5);}

function startGame(){
  questions=shuffle(VOCAB).slice(0,ROUND);
  cur=0;score=0;lives=3;correctCount=0;
  document.getElementById('screen-over').style.display='none';
  document.getElementById('screen-game').style.display='block';
  loadQ();
}

function renderLives(){document.getElementById('lives').innerHTML='❤️'.repeat(lives)+'🖤'.repeat(3-lives);}

function loadQ(){
  const q=questions[cur];
  document.getElementById('qnum').textContent=`${cur+1}/${ROUND}`;
  document.getElementById('score').textContent=score;
  document.getElementById('prog').style.width=`${(cur/ROUND)*100}%`;
  document.getElementById('the-word').textContent=q.word;
  document.getElementById('word-meta').textContent=q.pos;
  document.getElementById('example-reveal').className='example-reveal';
  renderLives();

  const opts=shuffle([{text:q.def,correct:true},...q.wrong.map(w=>({text:w,correct:false}))]);
  const keys=['A','B','C','D'];
  const container=document.getElementById('options');
  container.innerHTML='';
  opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML=`<span class="opt-key">${keys[i]}</span><span>${opt.text}</span>`;
    btn.dataset.correct=opt.correct;
    btn.dataset.def=opt.text;
    btn.dataset.key=keys[i];
    btn.addEventListener('click',()=>pick(btn,opt,q));
    container.appendChild(btn);
  });
}

function pick(btn,opt,q){
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  const card=document.getElementById('word-card');
  const msgs_good=["That's the one! 🎯","You actually know your words!","Easy.","Correct! Building that vocab.","Nailed it 💅"];
  const msgs_bad=[`Nope — "${q.def.slice(0,40)}..."`,`Wrong. Study "${q.word}" tonight.`,`Not quite. The correct one is highlighted.`,`Incorrect. ${q.word} caught you slipping.`];

  if(opt.correct){
    btn.classList.add('correct');
    score+=10;correctCount++;
    sfxCorrect();
    card.classList.add('correct-flash');
    setTimeout(()=>card.classList.remove('correct-flash'),400);
    // show example
    const ex=document.getElementById('example-reveal');
    ex.innerHTML=`<em>"${q.example}"</em>`;
    ex.classList.add('show');
  }else{
    btn.classList.add('wrong');
    document.querySelectorAll('.opt').forEach(b=>{if(b.dataset.correct==='true')b.classList.add('correct');});
    lives--;
    sfxWrong();
    card.classList.add('wrong-flash');
    setTimeout(()=>card.classList.remove('wrong-flash'),450);
    renderLives();
    const ex=document.getElementById('example-reveal');
    ex.innerHTML=`Correct: <strong>${q.def}</strong><br><br><em>"${q.example}"</em>`;
    ex.classList.add('show');
  }
  document.getElementById('score').textContent=score;

  if(lives<=0){setTimeout(endGame,2000);return;}
  setTimeout(next,2200);
}

function next(){cur++;if(cur>=questions.length)endGame();else loadQ();}

function endGame(){
  document.getElementById('screen-game').style.display='none';
  document.getElementById('screen-over').style.display='block';
  document.getElementById('prog').style.width='100%';
  const prev=getBest();
  if(score>prev)localStorage.setItem('wm-best',score);
  document.getElementById('res-score').textContent=score;
  document.getElementById('res-correct').textContent=`${correctCount}/${ROUND}`;
  document.getElementById('res-best').textContent=Math.max(prev,score);

  const pct=correctCount/ROUND;
  let emoji,title,sub;
  if(pct>=0.9){emoji='🏆';title='Vocabulary master!';sub='You\'re going to start using these words in real life and everyone will be impressed. Or confused. Either way.';sfxWin();launchConfetti();}
  else if(pct>=0.6){emoji='📚';title='Solid vocab!';sub='You know your words. A few tricky ones got you but you held your ground.'}
  else if(pct>=0.3){emoji='🤔';title='Getting there.';sub='Some of these are genuinely hard. Play again and watch your score improve.'}
  else{emoji='📝';title='Study session needed.';sub='These words will make you sound incredibly smart once you know them. So come back.'}
  document.getElementById('over-emoji').textContent=emoji;
  document.getElementById('over-title').textContent=title;
  document.getElementById('over-sub').textContent=sub;
}

// keyboard shortcuts
document.addEventListener('keydown',e=>{
  const key=e.key.toUpperCase();
  if(!['A','B','C','D'].includes(key))return;
  const btn=document.querySelector(`.opt[data-key="${key}"]:not(:disabled)`);
  if(btn)btn.click();
});

document.getElementById('btn-restart').addEventListener('click',startGame);
startGame();
</script>
</body>
</html>
