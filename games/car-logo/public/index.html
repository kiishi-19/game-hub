<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Car Logo Quiz</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0505; --surface: #1a0a0a; --border: rgba(220,38,38,0.2);
      --accent: #dc2626; --accent2: #f87171;
      --text: #fff1f1; --muted: rgba(255,255,255,0.45);
      --green: #22c55e; --red: #f43f5e; --yellow: #fbbf24;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 1.5rem;
      background-image: radial-gradient(ellipse at top, rgba(220,38,38,0.1) 0%, transparent 60%);
    }
    .back { position:fixed;top:1rem;left:1rem;color:var(--muted);text-decoration:none;font-size:0.8rem;transition:color 0.15s; }
    .back:hover { color:var(--accent2); }

    .game { width:100%; max-width:560px; }
    .header { text-align:center; margin-bottom:2rem; }
    .header h1 { font-size:2rem; font-weight:900; letter-spacing:-0.03em; }
    .header h1 span { background:linear-gradient(135deg,#f87171,#dc2626); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .header p { color:var(--muted); font-size:0.875rem; margin-top:0.3rem; }

    .hud {
      display:flex; justify-content:space-between;
      background:var(--surface); border:1px solid var(--border);
      border-radius:14px; padding:0.85rem 1.25rem; margin-bottom:1rem;
    }
    .hud-item { text-align:center; }
    .hud-label { font-size:0.65rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:0.2rem; }
    .hud-val { font-size:1.3rem; font-weight:800; }

    .progress-wrap { height:4px; background:rgba(255,255,255,0.08); border-radius:99px; margin-bottom:1.25rem; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),#f97316); border-radius:99px; transition:width 0.4s ease; }

    /* Logo card */
    .logo-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:20px; padding:2rem; margin-bottom:1rem;
      position:relative; overflow:hidden;
      transition:border-color 0.3s;
    }
    .logo-card::before {
      content:''; position:absolute; top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,transparent,var(--accent),transparent); opacity:0.6;
    }
    .logo-card.correct-flash { animation:cFlash 0.5s ease; border-color:var(--green); }
    .logo-card.wrong-flash { animation:shake 0.45s cubic-bezier(0.36,0.07,0.19,0.97); border-color:var(--red); }
    @keyframes cFlash { 0%{background:var(--surface)} 40%{background:rgba(34,197,94,0.15)} 100%{background:var(--surface)} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 15%{transform:translateX(-8px)} 30%{transform:translateX(8px)} 45%{transform:translateX(-6px)} 60%{transform:translateX(6px)} 75%{transform:translateX(-3px)} 90%{transform:translateX(3px)} }

    /* Logo display */
    .logo-display {
      display:flex; align-items:center; justify-content:center;
      height:170px; margin-bottom:1.25rem;
      position:relative;
    }
    .logo-img {
      max-width:200px; max-height:150px;
      width:auto; height:auto;
      object-fit:contain;
      transition:filter 0.5s ease, transform 0.3s ease;
      filter:drop-shadow(0 4px 20px rgba(0,0,0,0.5));
    }
    .logo-img.blurred { filter:blur(18px) brightness(0.5) drop-shadow(0 4px 20px rgba(0,0,0,0.5)); transform:scale(1.05); }
    .logo-img.revealed { filter:drop-shadow(0 4px 20px rgba(0,0,0,0.5)) drop-shadow(0 0 30px rgba(255,255,255,0.1)); transform:scale(1); }

    /* countdown ring */
    .reveal-countdown {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      font-size:2.5rem; font-weight:900; color:rgba(255,255,255,0.6);
      pointer-events:none; transition:opacity 0.3s;
    }
    .reveal-countdown.hidden { opacity:0; }

    .brand-hint { text-align:center; font-size:0.8rem; color:var(--muted); margin-bottom:1.5rem; min-height:1.2rem; transition:color 0.3s; }

    .options { display:grid; grid-template-columns:1fr 1fr; gap:0.65rem; }
    .opt {
      background:rgba(255,255,255,0.05); border:2px solid rgba(255,255,255,0.1);
      border-radius:10px; padding:0.85rem 0.75rem;
      font-size:0.9rem; font-weight:700;
      cursor:pointer; color:var(--text);
      transition:all 0.15s; text-align:left;
      display:flex; align-items:center; gap:0.5rem;
      font-family:'Inter',sans-serif;
    }
    .opt:hover:not(:disabled) { border-color:var(--accent); background:rgba(220,38,38,0.1); transform:translateY(-1px); }
    .opt.correct { border-color:var(--green); background:rgba(34,197,94,0.12); color:var(--green); animation:popIn 0.25s cubic-bezier(0.34,1.56,0.64,1); }
    .opt.wrong { border-color:var(--red); background:rgba(244,63,94,0.1); color:var(--red); }
    .opt:disabled { cursor:default; }
    .opt-letter { width:1.6rem; height:1.6rem; border-radius:6px; background:rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; font-size:0.75rem; font-weight:800; flex-shrink:0; }
    .opt.correct .opt-letter { background:rgba(34,197,94,0.2); }
    .opt.wrong .opt-letter { background:rgba(244,63,94,0.2); }
    @keyframes popIn { 0%{transform:scale(0.9)} 100%{transform:scale(1)} }

    .feedback { min-height:2rem; text-align:center; font-size:0.9rem; font-weight:700; padding:0.5rem 0; }
    .feedback.good { color:var(--green); }
    .feedback.bad { color:var(--red); }

    /* lifelines */
    .lifelines { display:flex; gap:0.65rem; margin-bottom:1rem; }
    .lifeline-btn {
      flex:1; padding:0.6rem; border-radius:10px;
      border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05);
      color:var(--muted); font-size:0.8rem; font-weight:700; cursor:pointer;
      transition:all 0.15s; font-family:'Inter',sans-serif;
    }
    .lifeline-btn:hover:not(:disabled) { border-color:rgba(255,255,255,0.3); color:var(--text); background:rgba(255,255,255,0.1); }
    .lifeline-btn:disabled { opacity:0.3; cursor:default; }

    /* game over */
    #screen-over { display:none; text-align:center; }
    .over-emoji { font-size:4rem; margin-bottom:0.75rem; animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    .over-title { font-size:2.2rem; font-weight:900; letter-spacing:-0.03em; margin-bottom:0.5rem; }
    .over-sub { color:var(--muted); margin-bottom:2rem; font-size:0.9rem; line-height:1.5; }
    .result-chips { display:flex; gap:0.75rem; justify-content:center; margin-bottom:2rem; }
    .chip { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1rem 1.5rem; text-align:center; }
    .chip-val { font-size:2rem; font-weight:900; color:var(--accent2); }
    .chip-label { font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.07em; margin-top:0.2rem; }
    .btn-row { display:flex; gap:0.75rem; max-width:320px; margin:0 auto; }
    .btn { flex:1; padding:0.9rem; border-radius:10px; border:none; font-size:0.9rem; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif; transition:all 0.15s; }
    .btn-primary { background:linear-gradient(135deg,#b91c1c,#dc2626); color:#fff; }
    .btn-primary:hover { box-shadow:0 4px 20px rgba(220,38,38,0.5); }
    .btn-secondary { background:rgba(255,255,255,0.07); color:var(--muted); border:1px solid rgba(255,255,255,0.1); }

    #confetti-canvas { position:fixed; inset:0; pointer-events:none; z-index:100; }
  </style>
</head>
<body>
  <a class="back" href="https://game-hub.kiishiogunbiyi.workers.dev">← Hub</a>
  <canvas id="confetti-canvas"></canvas>

  <div class="game">
    <div class="header">
      <h1>🚗 <span>Car Logo</span> Quiz</h1>
      <p>Recognize the brand. No name on the logo. Just you and the badge.</p>
    </div>

    <div id="screen-game">
      <div class="hud">
        <div class="hud-item"><div class="hud-label">Score</div><div class="hud-val" id="score" style="color:#f87171">0</div></div>
        <div class="hud-item"><div class="hud-label">Question</div><div class="hud-val" id="qnum" style="color:var(--muted)">1/12</div></div>
        <div class="hud-item"><div class="hud-label">Best</div><div class="hud-val" id="best" style="color:var(--yellow)">0</div></div>
      </div>

      <div class="progress-wrap"><div class="progress-fill" id="prog" style="width:0%"></div></div>

      <div class="logo-card" id="logo-card">
        <div class="logo-display">
          <img class="logo-img blurred" id="logo-img" src="" alt="Car logo" />
          <div class="reveal-countdown" id="countdown">3</div>
        </div>
        <div class="brand-hint" id="brand-hint">Logo reveals in a moment...</div>
        <div class="options" id="options"></div>
        <div class="feedback" id="feedback"></div>
      </div>

      <div class="lifelines">
        <button class="lifeline-btn" id="ll-reveal">👁 Reveal Now</button>
        <button class="lifeline-btn" id="ll-fifty">✂️ 50/50</button>
        <button class="lifeline-btn" id="ll-skip">⏭ Skip</button>
      </div>
    </div>

    <div id="screen-over">
      <div class="over-emoji" id="over-emoji">🏁</div>
      <div class="over-title" id="over-title">Race over!</div>
      <div class="over-sub" id="over-sub"></div>
      <div class="result-chips">
        <div class="chip"><div class="chip-val" id="res-score">0</div><div class="chip-label">Score</div></div>
        <div class="chip"><div class="chip-val" id="res-correct">0</div><div class="chip-label">Correct</div></div>
        <div class="chip"><div class="chip-val" id="res-best">0</div><div class="chip-label">Best</div></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="location.href='https://game-hub.kiishiogunbiyi.workers.dev'">← Hub</button>
        <button class="btn btn-primary" id="btn-restart">Play Again</button>
      </div>
    </div>
  </div>

<script>
// ── AUDIO ──────────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function playTone(f,t,d,v=0.3,delay=0){const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime+delay);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+delay+d);o.start(AC.currentTime+delay);o.stop(AC.currentTime+delay+d+0.05);}
function sfxCorrect(){playTone(523,'sine',0.1,0.3);playTone(659,'sine',0.1,0.3,0.1);playTone(784,'sine',0.18,0.3,0.2);}
function sfxWrong(){playTone(200,'sawtooth',0.15,0.25);playTone(150,'sawtooth',0.2,0.2,0.15);}
function sfxWin(){[523,659,784,1047].forEach((f,i)=>playTone(f,'sine',0.15,0.25,i*0.1));}

// ── CONFETTI ───────────────────────────────────────────────────────────────
const canvas=document.getElementById('confetti-canvas');const ctx=canvas.getContext('2d');let particles=[];
function launchConfetti(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;for(let i=0;i<120;i++){particles.push({x:Math.random()*canvas.width,y:-10,vx:(Math.random()-0.5)*6,vy:Math.random()*4+2,w:Math.random()*10+4,h:Math.random()*5+3,rot:Math.random()*360,vr:(Math.random()-0.5)*8,color:['#dc2626','#f87171','#22c55e','#fbbf24','#38bdf8','#a78bfa'][Math.floor(Math.random()*6)],alpha:1});}requestAnimationFrame(animateConfetti);}
function animateConfetti(){ctx.clearRect(0,0,canvas.width,canvas.height);particles=particles.filter(p=>p.alpha>0.05);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;if(p.y>canvas.height*0.7)p.alpha-=0.02;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});if(particles.length)requestAnimationFrame(animateConfetti);}

// ── CAR DATA ───────────────────────────────────────────────────────────────
// Using carlogos.org for real brand logos (no text on logo)
const BASE = 'https://www.carlogos.org/car-logos/';

const CARS = [
  { brand:"BMW",          img: BASE+"bmw-logo.png",           hint:"German luxury — Bayerische Motoren Werke, Munich 1916" },
  { brand:"Mercedes-Benz",img: BASE+"mercedes-benz-logo.png", hint:"German luxury — three-pointed star represents land, sea and air" },
  { brand:"Audi",         img: BASE+"audi-logo.png",          hint:"German brand — four rings representing four merged companies" },
  { brand:"Ferrari",      img: BASE+"ferrari-logo.png",       hint:"Italian supercar — prancing horse on a yellow shield" },
  { brand:"Lamborghini",  img: BASE+"lamborghini-logo.png",   hint:"Italian supercar — raging bull, named after fighting bulls" },
  { brand:"Porsche",      img: BASE+"porsche-logo.png",       hint:"German sports car — Stuttgart coat of arms with a horse" },
  { brand:"Toyota",       img: BASE+"toyota-logo.png",        hint:"Japanese giant — three ellipses representing customer, product and progress" },
  { brand:"Ford",         img: BASE+"ford-logo.png",          hint:"American icon — blue oval badge, family name since 1903" },
  { brand:"Volkswagen",   img: BASE+"volkswagen-logo.png",    hint:"German — 'People's Car', VW stacked in a circle" },
  { brand:"Honda",        img: BASE+"honda-logo.png",         hint:"Japanese — stylized H, founded by Soichiro Honda in 1948" },
  { brand:"Tesla",        img: BASE+"tesla-logo.png",         hint:"American EV pioneer — T inspired by electric motor cross-section" },
  { brand:"Chevrolet",    img: BASE+"chevrolet-logo.png",     hint:"American — golden bowtie badge since 1913" },
  { brand:"Maserati",     img: BASE+"maserati-logo.png",      hint:"Italian luxury — trident from Bologna's Neptune fountain" },
  { brand:"Bugatti",      img: BASE+"bugatti-logo.png",       hint:"French hypercar — EB initials for Ettore Bugatti, founded 1909" },
  { brand:"Bentley",      img: BASE+"bentley-logo.png",       hint:"British luxury — winged B badge, hand-built in Crewe since 1919" },
  { brand:"Rolls-Royce",  img: BASE+"rolls-royce-logo.png",   hint:"British ultra-luxury — Spirit of Ecstasy hood ornament since 1906" },
];

// ── GAME ───────────────────────────────────────────────────────────────────
const ROUND = 12;
let questions=[], cur=0, score=0, correct=0;
let countdownTimer=null, llRevealUsed=false, llFiftyUsed=false;
const getBest = () => parseInt(localStorage.getItem('car-best')||'0');

function shuffle(a){ return [...a].sort(()=>Math.random()-0.5); }

function getWrong(q, all){
  return shuffle(all.filter(c=>c.brand!==q.brand)).slice(0,3).map(c=>c.brand);
}

function startGame(){
  questions = shuffle(CARS).slice(0, ROUND);
  cur=0; score=0; correct=0;
  llRevealUsed=false; llFiftyUsed=false;
  document.getElementById('best').textContent = getBest();
  document.getElementById('screen-over').style.display = 'none';
  document.getElementById('screen-game').style.display = 'block';
  resetLifelines();
  loadQ();
}

function resetLifelines(){
  llRevealUsed = false; llFiftyUsed = false;
  document.getElementById('ll-reveal').disabled = false;
  document.getElementById('ll-fifty').disabled = false;
  document.getElementById('ll-skip').disabled = false;
}

function loadQ(){
  const q = questions[cur];
  document.getElementById('qnum').textContent = `${cur+1}/${ROUND}`;
  document.getElementById('score').textContent = score;
  document.getElementById('prog').style.width = `${(cur/ROUND)*100}%`;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('brand-hint').textContent = 'Logo reveals in a moment...';
  document.getElementById('brand-hint').style.color = '';

  // Set logo — start blurred
  const img = document.getElementById('logo-img');
  img.src = q.img;
  img.className = 'logo-img blurred';

  // Countdown: 3, 2, 1, reveal
  const cd = document.getElementById('countdown');
  cd.classList.remove('hidden');
  let count = 3;
  cd.textContent = count;
  clearInterval(countdownTimer);
  countdownTimer = setInterval(()=>{
    count--;
    if(count > 0){ cd.textContent = count; }
    else {
      clearInterval(countdownTimer);
      cd.classList.add('hidden');
      img.className = 'logo-img revealed';
      document.getElementById('brand-hint').textContent = 'Which brand is this?';
    }
  }, 800);

  // Build answer options immediately
  const opts = shuffle([q.brand, ...getWrong(q, CARS)]);
  const letters = ['A','B','C','D'];
  const container = document.getElementById('options');
  container.innerHTML = '';
  opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span>${opt}`;
    btn.dataset.brand = opt;
    btn.addEventListener('click', () => answer(btn, opt, q));
    container.appendChild(btn);
  });
}

function answer(btn, chosen, q){
  clearInterval(countdownTimer);
  document.getElementById('countdown').classList.add('hidden');
  document.getElementById('logo-img').className = 'logo-img revealed';
  document.querySelectorAll('.opt').forEach(b => b.disabled = true);

  const card = document.getElementById('logo-card');
  const fb = document.getElementById('feedback');
  const hint = document.getElementById('brand-hint');

  const msgs_good = ["Recognized it! 🎯","That's a car person!","No hesitation 🔥","Easy money.","Petrolhead energy!"];
  const msgs_bad = [`Nope — that's ${q.brand} 😅`,`${q.brand} was right there bro`,`${q.brand}. Study the badges.`,`Not even close. It's ${q.brand}.`];

  if(chosen === q.brand){
    btn.classList.add('correct');
    score += 10; correct++;
    sfxCorrect();
    card.classList.add('correct-flash');
    setTimeout(()=>card.classList.remove('correct-flash'), 500);
    fb.className = 'feedback good';
    fb.textContent = msgs_good[Math.floor(Math.random()*msgs_good.length)];
    hint.textContent = q.hint;
    hint.style.color = 'rgba(255,255,255,0.7)';
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.opt').forEach(b => {
      if(b.dataset.brand === q.brand) b.classList.add('correct');
    });
    sfxWrong();
    card.classList.add('wrong-flash');
    setTimeout(()=>card.classList.remove('wrong-flash'), 450);
    fb.className = 'feedback bad';
    fb.textContent = msgs_bad[Math.floor(Math.random()*msgs_bad.length)];
    hint.textContent = q.hint;
    hint.style.color = 'rgba(255,255,255,0.5)';
  }
  document.getElementById('score').textContent = score;
  setTimeout(next, 2200);
}

function next(){
  cur++;
  if(cur >= questions.length) endGame();
  else loadQ();
}

function endGame(){
  clearInterval(countdownTimer);
  document.getElementById('screen-game').style.display = 'none';
  document.getElementById('screen-over').style.display = 'block';
  const prev = getBest();
  if(score > prev) localStorage.setItem('car-best', score);
  const best = Math.max(prev, score);
  document.getElementById('res-score').textContent = score;
  document.getElementById('res-correct').textContent = `${correct}/${ROUND}`;
  document.getElementById('res-best').textContent = best;
  document.getElementById('prog').style.width = '100%';

  const pct = correct/ROUND;
  let emoji,title,sub;
  if(pct >= 0.9){ emoji='🏆'; title='Petrolhead certified!'; sub='You clearly spend too much time watching Top Gear. Respect.'; sfxWin(); launchConfetti(); }
  else if(pct >= 0.6){ emoji='🚀'; title='Solid car knowledge!'; sub='You know your badges. A few exotics caught you out but you held your own.'; }
  else if(pct >= 0.3){ emoji='🚗'; title='Getting there...'; sub='Some of those are genuinely tricky. Study up on the European marques.'; }
  else { emoji='😅'; title='Maybe stick to public transit?'; sub='It\'s okay. Not everyone grew up reading car magazines. But now you will.'; }
  document.getElementById('over-emoji').textContent = emoji;
  document.getElementById('over-title').textContent = title;
  document.getElementById('over-sub').textContent = sub;
}

// ── LIFELINES ──────────────────────────────────────────────────────────────
document.getElementById('ll-reveal').addEventListener('click', () => {
  if(llRevealUsed) return;
  llRevealUsed = true;
  document.getElementById('ll-reveal').disabled = true;
  clearInterval(countdownTimer);
  document.getElementById('countdown').classList.add('hidden');
  document.getElementById('logo-img').className = 'logo-img revealed';
  document.getElementById('brand-hint').textContent = questions[cur].hint;
  document.getElementById('brand-hint').style.color = 'rgba(255,255,255,0.7)';
});

document.getElementById('ll-fifty').addEventListener('click', () => {
  if(llFiftyUsed) return;
  llFiftyUsed = true;
  document.getElementById('ll-fifty').disabled = true;
  const correct = questions[cur].brand;
  const opts = document.querySelectorAll('.opt');
  let removed = 0;
  opts.forEach(b => {
    if(b.dataset.brand !== correct && removed < 2){
      b.disabled = true;
      b.style.opacity = '0.2';
      removed++;
    }
  });
});

document.getElementById('ll-skip').addEventListener('click', () => {
  clearInterval(countdownTimer);
  document.getElementById('ll-skip').disabled = true;
  next();
});

document.getElementById('btn-restart').addEventListener('click', startGame);

startGame();
</script>
</body>
</html>
