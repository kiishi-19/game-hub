<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spelling Challenge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13; --surface: #1a1a24; --border: #2a2a3a;
      --accent: #f6821f; --text: #e8e8f0; --text-muted: #888899;
      --green: #22c55e; --red: #ef4444;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; }
    .back { position: fixed; top: 1rem; left: 1rem; color: var(--text-muted); text-decoration: none; font-size: 0.85rem; }
    .back:hover { color: var(--accent); }
    .game { width: 100%; max-width: 520px; text-align: center; }
    h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.25rem; }
    .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; }
    .score-bar { display: flex; justify-content: space-between; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1.25rem; margin-bottom: 2rem; font-size: 0.9rem; }
    .score-bar span { color: var(--text-muted); }
    .score-bar strong { color: var(--accent); font-size: 1.1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 2rem; margin-bottom: 1.5rem; }
    .word-display { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 0.5rem; min-height: 1.5rem; }
    .definition { font-size: 1rem; line-height: 1.6; color: var(--text); margin-bottom: 1.5rem; min-height: 3rem; }
    .hint-label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .letters { display: flex; gap: 0.4rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .letter-box { width: 2.2rem; height: 2.5rem; border: 2px solid var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; background: var(--bg); }
    .letter-box.filled { border-color: var(--accent); color: var(--accent); }
    .letter-box.correct { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.1); }
    .letter-box.wrong { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.1); }
    input { width: 100%; padding: 0.85rem 1rem; border-radius: 8px; border: 2px solid var(--border); background: var(--bg); color: var(--text); font-size: 1.1rem; text-align: center; text-transform: uppercase; letter-spacing: 0.1em; outline: none; transition: border-color 0.15s; }
    input:focus { border-color: var(--accent); }
    .btn-row { display: flex; gap: 0.75rem; margin-top: 1rem; }
    button { flex: 1; padding: 0.85rem; border-radius: 8px; border: none; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
    button:hover { opacity: 0.85; }
    #btn-check { background: var(--accent); color: #fff; }
    #btn-skip { background: var(--surface); color: var(--text-muted); border: 1px solid var(--border); }
    #btn-speak { background: var(--surface); color: var(--text-muted); border: 1px solid var(--border); }
    .feedback { min-height: 2rem; font-size: 1rem; font-weight: 600; margin-top: 0.75rem; }
    .feedback.correct { color: var(--green); }
    .feedback.wrong { color: var(--red); }
    #game-over { display: none; }
    #game-over h2 { font-size: 2rem; margin-bottom: 0.5rem; }
    #game-over p { color: var(--text-muted); margin-bottom: 1.5rem; }
    #btn-restart { background: var(--accent); color: #fff; padding: 0.85rem 2rem; border-radius: 8px; border: none; font-size: 1rem; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <a class="back" href="https://game-hub.kiishiogunbiyi.workers.dev">← Game Hub</a>

  <div class="game">
    <h1>✏️ Spelling Challenge</h1>
    <p class="subtitle">Spell the word correctly based on the definition</p>

    <div class="score-bar">
      <span>Score: <strong id="score">0</strong></span>
      <span>Question <strong id="qnum">1</strong> / <strong id="qtotal">10</strong></span>
      <span>Streak: <strong id="streak">0</strong></span>
    </div>

    <div id="game-area">
      <div class="card">
        <div class="word-display" id="word-display"></div>
        <div class="definition" id="definition">Loading...</div>
        <div class="hint-label">Spell the word:</div>
        <div class="letters" id="letters"></div>
        <input type="text" id="answer-input" placeholder="Type your answer..." autocomplete="off" autocorrect="off" spellcheck="false" />
        <div class="btn-row">
          <button id="btn-speak">🔊 Hear it</button>
          <button id="btn-skip">Skip</button>
          <button id="btn-check">Check</button>
        </div>
        <div class="feedback" id="feedback"></div>
      </div>
    </div>

    <div id="game-over">
      <h2>Game Over!</h2>
      <p id="final-score"></p>
      <button id="btn-restart">Play Again</button>
    </div>
  </div>

  <script>
    const WORDS = [
      { word: "accommodate", def: "To provide lodging or space for someone; to make room for." },
      { word: "conscientious", def: "Wishing to do what is right, especially in work; diligent and careful." },
      { word: "mischievous", def: "Causing or showing a fondness for causing trouble in a playful way." },
      { word: "perseverance", def: "Continued effort to do something despite difficulty or delay in achieving success." },
      { word: "entrepreneur", def: "A person who organizes and operates a business, taking on financial risk." },
      { word: "acknowledge", def: "To accept or admit the existence or truth of something." },
      { word: "surveillance", def: "Close observation, especially of a suspected spy or criminal." },
      { word: "exaggerate", def: "To represent something as being larger, better, or worse than it really is." },
      { word: "guarantee", def: "A formal promise or assurance that certain conditions will be fulfilled." },
      { word: "Mediterranean", def: "Relating to the sea bordered by Europe, North Africa, and western Asia." },
      { word: "necessary", def: "Required to be done; absolutely needed to achieve a certain result." },
      { word: "occasionally", def: "At infrequent or irregular intervals; not often but sometimes." },
      { word: "privilege", def: "A special right, advantage, or immunity granted to a particular person or group." },
      { word: "definitely", def: "Without any doubt; used to emphasize that something is certain." },
      { word: "occurrence", def: "An incident or event; the fact of something happening." },
      { word: "rhythm", def: "A strong, regular, repeated pattern of movement or sound." },
      { word: "superstitious", def: "Excessively credulous belief in and reverence for supernatural influences." },
      { word: "weird", def: "Suggesting something supernatural; uncanny or strange." },
      { word: "liaison", def: "Communication or cooperation between people or groups; a person who does this." },
      { word: "bureaucracy", def: "A system of government or management with complex rules and processes." },
    ];

    let questions = [], current = 0, score = 0, streak = 0;

    function shuffle(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function startGame() {
      questions = shuffle(WORDS).slice(0, 10);
      current = 0; score = 0; streak = 0;
      document.getElementById("qtotal").textContent = questions.length;
      document.getElementById("game-over").style.display = "none";
      document.getElementById("game-area").style.display = "block";
      loadQuestion();
    }

    function loadQuestion() {
      const q = questions[current];
      document.getElementById("qnum").textContent = current + 1;
      document.getElementById("score").textContent = score;
      document.getElementById("streak").textContent = streak;
      document.getElementById("definition").textContent = q.def;
      document.getElementById("word-display").textContent = "";
      document.getElementById("feedback").textContent = "";
      document.getElementById("feedback").className = "feedback";
      document.getElementById("answer-input").value = "";
      document.getElementById("answer-input").disabled = false;
      document.getElementById("btn-check").disabled = false;
      renderBoxes(q.word.length);
      document.getElementById("answer-input").focus();
      speakWord(q.word);
    }

    function renderBoxes(len) {
      const c = document.getElementById("letters");
      c.innerHTML = "";
      for (let i = 0; i < len; i++) {
        const box = document.createElement("div");
        box.className = "letter-box";
        box.id = `box-${i}`;
        c.appendChild(box);
      }
    }

    function updateBoxes(val, word) {
      for (let i = 0; i < word.length; i++) {
        const box = document.getElementById(`box-${i}`);
        if (!box) continue;
        const ch = val[i] || "";
        box.textContent = ch.toUpperCase();
        box.className = "letter-box" + (ch ? " filled" : "");
      }
    }

    function speakWord(word) {
      if (!window.speechSynthesis) return;
      const utt = new SpeechSynthesisUtterance(word);
      utt.rate = 0.85;
      speechSynthesis.speak(utt);
    }

    function check() {
      const q = questions[current];
      const val = document.getElementById("answer-input").value.trim().toLowerCase();
      const correct = q.word.toLowerCase();
      const fb = document.getElementById("feedback");
      const boxes = document.querySelectorAll(".letter-box");

      for (let i = 0; i < correct.length; i++) {
        const box = document.getElementById(`box-${i}`);
        if (!box) continue;
        const ch = val[i] || "";
        box.textContent = ch.toUpperCase() || correct[i].toUpperCase();
        box.className = "letter-box " + (ch.toLowerCase() === correct[i] ? "correct" : "wrong");
      }

      document.getElementById("answer-input").disabled = true;
      document.getElementById("btn-check").disabled = true;

      if (val === correct) {
        score += 10 + streak;
        streak++;
        fb.textContent = `Correct! ${streak > 1 ? `+${streak - 1} streak bonus` : ""}`;
        fb.className = "feedback correct";
      } else {
        streak = 0;
        fb.textContent = `Wrong. It's "${q.word}"`;
        fb.className = "feedback wrong";
      }
      document.getElementById("score").textContent = score;
      document.getElementById("streak").textContent = streak;

      setTimeout(next, 1800);
    }

    function next() {
      current++;
      if (current >= questions.length) {
        document.getElementById("game-area").style.display = "none";
        document.getElementById("game-over").style.display = "block";
        document.getElementById("final-score").textContent = `You scored ${score} points out of ${questions.length * 10} possible.`;
      } else {
        loadQuestion();
      }
    }

    document.getElementById("answer-input").addEventListener("input", (e) => {
      const q = questions[current];
      updateBoxes(e.target.value, q.word);
    });
    document.getElementById("answer-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") check();
    });
    document.getElementById("btn-check").addEventListener("click", check);
    document.getElementById("btn-skip").addEventListener("click", () => {
      streak = 0; next();
    });
    document.getElementById("btn-speak").addEventListener("click", () => {
      speakWord(questions[current].word);
    });
    document.getElementById("btn-restart").addEventListener("click", startGame);

    startGame();
  </script>
</body>
</html>
