name: Preview Deployment (PR)

on:
  pull_request:
    branches:
      - main

jobs:
  preview:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed games
        id: changes
        run: |
          git fetch origin main
          CHANGED=$(git diff --name-only origin/main...HEAD)
          echo "hub=$(echo "$CHANGED" | grep -q '^hub/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "spelling=$(echo "$CHANGED" | grep -q '^games/spelling/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "car_logo=$(echo "$CHANGED" | grep -q '^games/car-logo/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "speed_math=$(echo "$CHANGED" | grep -q '^games/speed-math/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "word_meaning=$(echo "$CHANGED" | grep -q '^games/word-meaning/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "crossword=$(echo "$CHANGED" | grep -q '^games/crossword/' && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Preview Hub
        if: steps.changes.outputs.hub == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: hub
          command: deploy --name game-hub-pr-${{ github.event.pull_request.number }}

      - name: Preview Spelling
        if: steps.changes.outputs.spelling == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: games/spelling
          command: deploy --name game-hub-spelling-pr-${{ github.event.pull_request.number }}

      - name: Preview Car Logo
        if: steps.changes.outputs.car_logo == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: games/car-logo
          command: deploy --name game-hub-car-logo-pr-${{ github.event.pull_request.number }}

      - name: Preview Speed Math
        if: steps.changes.outputs.speed_math == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: games/speed-math
          command: deploy --name game-hub-speed-math-pr-${{ github.event.pull_request.number }}

      - name: Preview Word Meaning
        if: steps.changes.outputs.word_meaning == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: games/word-meaning
          command: deploy --name game-hub-word-meaning-pr-${{ github.event.pull_request.number }}

      - name: Preview Crossword
        if: steps.changes.outputs.crossword == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: games/crossword
          command: deploy --name game-hub-crossword-pr-${{ github.event.pull_request.number }}

      - name: Comment preview URLs on PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const sub = 'kiishiogunbiyi';
            const hub = '${{ steps.changes.outputs.hub }}' === 'true';
            const spelling = '${{ steps.changes.outputs.spelling }}' === 'true';
            const carLogo = '${{ steps.changes.outputs.car_logo }}' === 'true';
            const speedMath = '${{ steps.changes.outputs.speed_math }}' === 'true';
            const wordMeaning = '${{ steps.changes.outputs.word_meaning }}' === 'true';
            const crossword = '${{ steps.changes.outputs.crossword }}' === 'true';

            const lines = [`## Preview Deployments — PR #${pr}`, ''];
            if (hub) lines.push(`- **Hub**: https://game-hub-pr-${pr}.${sub}.workers.dev`);
            if (spelling) lines.push(`- **Spelling**: https://game-hub-spelling-pr-${pr}.${sub}.workers.dev`);
            if (carLogo) lines.push(`- **Car Logo**: https://game-hub-car-logo-pr-${pr}.${sub}.workers.dev`);
            if (speedMath) lines.push(`- **Speed Math**: https://game-hub-speed-math-pr-${pr}.${sub}.workers.dev`);
            if (wordMeaning) lines.push(`- **Word Meaning**: https://game-hub-word-meaning-pr-${pr}.${sub}.workers.dev`);
            if (crossword) lines.push(`- **Crossword**: https://game-hub-crossword-pr-${pr}.${sub}.workers.dev`);
            lines.push('', '_Preview Workers will be cleaned up after merge._');

            github.rest.issues.createComment({
              issue_number: pr,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: lines.join('\n'),
            });
